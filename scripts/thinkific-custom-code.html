<script>
(function() {

    "66046562-10x-program-pre-course-assessment-2025",

    "66732300-before-you-go",
    "66870817-well-done",

    "67611774-10x-program-data-consent-form",
    "67615914-10x-program-safeguarding-form",
    "67390022-email-verification"
  ];

  function isTargetLesson() {
    return targetSlugs.some((slug) => location.pathname.includes(slug));
  }

  function hideButtons() {
    if (!isTargetLesson()) return;
    document.querySelectorAll("button, a").forEach((el) => {
      const text = el.innerText.trim().toLowerCase();
      if (
        text.includes("complete") ||
        text.includes("continue") ||
        text.includes("mark incomplete")
      ) {
        el.style.display = "none";
      }
    });
  }

  const observer = new MutationObserver(hideButtons);

  document.addEventListener("DOMContentLoaded", function() {
    if (isTargetLesson()) {
      hideButtons();
      observer.observe(document.body, {
        childList: true,
        subtree: true
      });
    }
  });
})();
</script>
